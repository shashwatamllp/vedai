<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VedAI Web Studio | Autonomous Local AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glow { box-shadow: 0 0 20px rgba(59,130,246,0.2); }
        .code-font { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .typing::after { content: '▋'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        pre { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body class="bg-[#080c14] text-gray-200 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-14 glass border-b border-white/5 flex items-center justify-between px-6 z-50 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-violet-600 rounded-lg flex items-center justify-center font-bold text-white text-sm glow">V</div>
            <h1 class="text-lg font-semibold tracking-tight text-white">VedAI <span class="text-blue-400 text-xs font-light">Studio</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <select id="model-select" class="bg-gray-900/80 border border-white/10 text-white text-xs rounded-lg px-3 py-1.5 outline-none focus:ring-1 focus:ring-blue-500 transition-all cursor-pointer">
                <option>Loading models...</option>
            </select>
            <div id="hw-status" class="flex items-center space-x-3 text-xs bg-gray-900/50 px-3 py-1.5 rounded-full border border-white/5">
                <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                <span id="cpu-load">CPU: --</span>
                <span class="text-gray-600">|</span>
                <span id="ram-load">RAM: --</span>
            </div>
            <div id="agent-status" class="text-xs px-3 py-1 rounded-full bg-gray-800 border border-white/5 text-gray-400">Idle</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">

        <!-- Left: Chat -->
        <section class="w-1/2 flex flex-col border-r border-white/5">
            <div id="chat-messages" class="flex-1 overflow-y-auto p-5 space-y-5">
                <div class="flex flex-col space-y-2">
                    <div class="text-xs text-blue-400 font-semibold uppercase tracking-widest">VedAI</div>
                    <div class="bg-blue-600/5 border border-blue-500/10 p-4 rounded-xl text-sm max-w-[92%]">
                        Welcome to VedAI Studio. I can write code, run it, and fix errors — all locally on your machine. What are we building today?
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 glass shrink-0">
                <div class="relative">
                    <textarea id="user-input" rows="3"
                        class="w-full bg-gray-900/60 border border-white/10 rounded-xl p-4 pr-14 focus:outline-none focus:border-blue-500 transition-all resize-none text-sm code-font"
                        placeholder="Ask VedAI to build something... (Shift+Enter for newline)"></textarea>
                    <button id="send-btn" class="absolute right-3 bottom-3 bg-blue-600 p-2 rounded-lg hover:bg-blue-500 transition-all glow">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Right: Live Steps + Preview -->
        <section class="w-1/2 flex flex-col bg-[#070b12]">
            <!-- Tabs -->
            <div class="h-10 border-b border-white/5 flex items-center px-4 space-x-4 shrink-0 bg-gray-900/30">
                <button onclick="switchTab('steps')" id="tab-steps" class="text-xs font-medium text-blue-400 border-b-2 border-blue-500 pb-2 px-1">LIVE STEPS</button>
                <button onclick="switchTab('preview')" id="tab-preview" class="text-xs font-medium text-gray-500 hover:text-gray-300 pb-2 px-1">PREVIEW</button>
                <button onclick="switchTab('terminal')" id="tab-terminal" class="text-xs font-medium text-gray-500 hover:text-gray-300 pb-2 px-1">TERMINAL</button>
            </div>

            <!-- Steps Panel -->
            <div id="panel-steps" class="flex-1 overflow-y-auto p-4 code-font text-gray-300 space-y-1">
                <div class="text-gray-600 italic text-xs">Waiting for a task...</div>
            </div>

            <!-- Preview Panel -->
            <div id="panel-preview" class="flex-1 bg-white hidden">
                <iframe id="preview-frame" class="w-full h-full border-none"></iframe>
            </div>

            <!-- Terminal Panel -->
            <div id="panel-terminal" class="flex-1 overflow-y-auto p-4 bg-black/60 code-font text-green-400 text-xs hidden">
                <div class="text-gray-600">$ awaiting commands...</div>
            </div>
        </section>

    </main>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const stepsPanel = document.getElementById('panel-steps');
        const terminalPanel = document.getElementById('panel-terminal');
        const agentStatus = document.getElementById('agent-status');
        let isRunning = false;

        function switchTab(tab) {
            ['steps','preview','terminal'].forEach(t => {
                document.getElementById(`panel-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('text-blue-400','border-b-2','border-blue-500');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500');
            });
            document.getElementById(`panel-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('text-blue-400','border-b-2','border-blue-500');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-500');
        }

        function appendMessage(role, text) {
            const wrap = document.createElement('div');
            wrap.className = 'flex flex-col space-y-2';
            const label = role === 'user'
                ? '<div class="text-xs text-gray-500 font-semibold uppercase tracking-widest text-right">You</div>'
                : '<div class="text-xs text-blue-400 font-semibold uppercase tracking-widest">VedAI</div>';
            const bubble = role === 'user'
                ? `<div class="bg-white/5 border border-white/10 p-4 rounded-xl max-w-[90%] self-end text-sm ml-auto">${text}</div>`
                : `<div id="current-response" class="bg-blue-600/5 border border-blue-500/10 p-4 rounded-xl max-w-[92%] text-sm whitespace-pre-wrap"></div>`;
            wrap.innerHTML = label + bubble;
            chatMessages.appendChild(wrap);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return wrap.querySelector('#current-response');
        }

        function appendStep(text) {
            const line = document.createElement('div');
            line.className = 'text-xs leading-relaxed';
            line.textContent = text;
            // Color coding
            if (text.includes('✅')) line.classList.add('text-green-400');
            else if (text.includes('❌')) line.classList.add('text-red-400');
            else if (text.includes('⚠️')) line.classList.add('text-yellow-400');
            else if (text.includes('🧠') || text.includes('📋') || text.includes('⚙️') || text.includes('🔄')) line.classList.add('text-blue-300');
            else line.classList.add('text-gray-300');
            stepsPanel.appendChild(line);
            stepsPanel.scrollTop = stepsPanel.scrollHeight;
        }

        async function sendMessage() {
            if (isRunning) return;
            const text = userInput.value.trim();
            if (!text) return;
            isRunning = true;
            sendBtn.disabled = true;

            appendMessage('user', text);
            userInput.value = '';

            const responseEl = appendMessage('assistant', '');
            stepsPanel.innerHTML = '';
            switchTab('steps');

            agentStatus.textContent = 'Running...';
            agentStatus.className = 'text-xs px-3 py-1 rounded-full bg-blue-900/50 border border-blue-500/30 text-blue-300';

            const selectedModel = document.getElementById('model-select').value;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, model: selectedModel })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let chatText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') break;
                        try {
                            const payload = JSON.parse(data);
                            const t = payload.text || '';

                            // Everything goes to chat
                            chatText += t;
                            if (responseEl) responseEl.textContent = chatText;

                            // Step indicators go to steps panel too
                            if (t.trim()) {
                                t.split('\n').forEach(l => { if (l.trim()) appendStep(l); });
                            }

                            // Detect terminal output → terminal panel
                            if (t.includes('```') || t.includes('OUTPUT:')) {
                                terminalPanel.innerHTML += `<div>${t}</div>`;
                            }

                            // Detect HTML preview
                            if (chatText.includes('<!DOCTYPE html') || chatText.includes('<html')) {
                                const match = chatText.match(/<html[\s\S]*<\/html>/i);
                                if (match) {
                                    document.getElementById('preview-frame').srcdoc = match[0];
                                }
                            }

                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        } catch {}
                    }
                }
            } catch (e) {
                if (responseEl) {
                    responseEl.textContent = '❌ Connection error. Make sure the server is running.';
                    responseEl.classList.add('text-red-400');
                }
            }

            agentStatus.textContent = 'Idle';
            agentStatus.className = 'text-xs px-3 py-1 rounded-full bg-gray-800 border border-white/5 text-gray-400';
            isRunning = false;
            sendBtn.disabled = false;
        }

        // Load hardware status and models
        async function loadStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                document.getElementById('cpu-load').textContent = `CPU: ${data.hardware.cpu_cores} Cores`;
                document.getElementById('ram-load').textContent = `RAM: ${data.hardware.ram_gb} GB`;

                const sel = document.getElementById('model-select');
                sel.innerHTML = '';
                (data.installed_models || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    if (m === data.recommended_model) opt.selected = true;
                    sel.appendChild(opt);
                });
            } catch {}
        }
        loadStatus();

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
    </script>
</body>
</html>
